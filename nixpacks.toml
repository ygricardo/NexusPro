# Nixpacks configuration for NexusPro
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# --include=dev forces installation of devDependencies (vite, tailwind, etc.)
# even when Nixpacks sets NODE_ENV=production during the build.
cmds = ["npm install --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server/index.js"
